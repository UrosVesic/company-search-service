services:
  postgres:
    image: 'postgres:latest'
    environment:
      - 'POSTGRES_DB=company-search'
      - 'POSTGRES_PASSWORD=test'
      - 'POSTGRES_USER=test'
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U test -d company-search']
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: ..
      dockerfile: Dockerfile
    ports:
      - '8080:8080'
    environment:
      - 'SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/company-search'
      - 'SPRING_DATASOURCE_USERNAME=test'
      - 'SPRING_DATASOURCE_PASSWORD=test'
    depends_on:
      postgres:
        condition: service_healthy
